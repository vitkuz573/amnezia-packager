name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # weekly: Monday 06:00
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (empty = latest)'
        required: false
        default: ''

env:
  OUTPUT_DIR: /tmp/packages

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -x build.sh src/**/*.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y bats jq curl
      - name: Run tests
        run: bats tests/ || true

  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y jq curl libfakeroot
      - name: Build .deb
        run: |
          mkdir -p "$OUTPUT_DIR"
          ./build.sh -d -o "$OUTPUT_DIR" $( [[ -n "${{ github.event.inputs.version }}" ]] && echo "-v ${{ github.event.inputs.version }}" )
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: /tmp/packages/*.deb

  build-arch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          pacman -Syu --noconfirm && pacman -S --noconfirm jq curl zstd fakeroot sudo
      - name: Build .pkg.tar.zst
        run: |
          mkdir -p "$OUTPUT_DIR"
          ./build.sh -a -o "$OUTPUT_DIR" $( [[ -n "${{ github.event.inputs.version }}" ]] && echo "-v ${{ github.event.inputs.version }}" )
      - name: Upload .pkg.tar.zst
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: /tmp/packages/*.pkg.tar.zst

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, build-deb, build-arch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deb-package/*.deb
            arch-package/*.pkg.tar.zst
          generate_release_notes: true

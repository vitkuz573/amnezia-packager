version: '0.1.{build}'

image: Ubuntu2204

branches:
  only:
    - main

skip_commits:
  files:
    - '*.md'
    - docs/**
    - .github/**

environment:
  OUTPUT_DIR: /tmp/packages
  REPO_DIR: /tmp/repo
  CORRELATION_ID: ci-{build}
  DEBIAN_FRONTEND: noninteractive

install:
  - sudo apt-get update -qq
  - sudo apt-get install -y -qq jq curl shellcheck bats dpkg-dev fakeroot rpm createrepo-c

build_script:
  - echo "Install completed"
  - which jq curl shellcheck bats dpkg-deb fakeroot rpmbuild createrepo_c

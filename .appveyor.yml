version: '0.1.{build}'

image: Ubuntu2204

environment:
  GITHUB_TOKEN:
    secure: o4Nsjt/mOeQpqBPpCnmSDb5GiWBRyLZSdR/bqYw5cBUbVQt/bjME8IkuRk1pWHc0
  OUTPUT_DIR: output

install:
  - sudo apt-get update -qq
  - sudo apt-get install -y -qq jq curl dpkg-dev fakeroot

build_script:
  - mkdir -p output
  - ./build.sh -d -o output --manifest > output/build.log 2>&1; echo "--- EXIT=$? ---" >> output/build.log
  - |
    exit_code=$(tail -1 output/build.log | grep -oP 'EXIT=\K\d+')
    if [ "$exit_code" = "0" ]; then
      echo "build.sh(1,1): info AV1: BUILD SUCCEEDED (exit=0)"
    else
      echo "build.sh(1,1): error AV1: BUILD FAILED (exit=${exit_code:-?})"
      echo "build.sh(1,1): error AV1: Last 5 lines of build.log:"
      tail -5 output/build.log | while IFS= read -r line; do
        echo "build.sh(1,1): error AV1: $line"
      done
    fi

after_build:
  - ls -la output/

artifacts:
  - path: output/build.log
    name: log

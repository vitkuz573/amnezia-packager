version: '0.1.{build}'

image: Ubuntu2204

branches:
  only:
    - main

skip_commits:
  files:
    - '*.md'
    - docs/**
    - .github/**

environment:
  OUTPUT_DIR: /tmp/packages
  REPO_DIR: /tmp/repo
  CORRELATION_ID: ci-{build}
  DEBIAN_FRONTEND: noninteractive

install:
  - sudo apt-get update -qq
  - sudo apt-get install -y -qq jq curl shellcheck bats dpkg-dev fakeroot rpm createrepo-c

build_script:
  - shellcheck -x build.sh src/core/*.sh src/stage/*.sh src/packager/*.sh tools/*.sh || true
  - bats tests/ || true
  - mkdir -p "$OUTPUT_DIR" "$REPO_DIR"
  - ./build.sh -n -d -o "$OUTPUT_DIR" 2>&1 || echo "BUILD_FAILED=$?"
  - echo "=== BUILD DIR ===" && ls -la "$OUTPUT_DIR" || true
  - echo "=== BUILD LOG ===" && cat /tmp/build.log 2>/dev/null || true

after_build:
  - echo "=== AFTER BUILD ===" && ls -la "$OUTPUT_DIR" || true

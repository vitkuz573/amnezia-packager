version: '0.1.{build}'

image: Ubuntu2204

environment:
  OUTPUT_DIR: output

install:
  - sudo apt-get update -qq
  - sudo apt-get install -y -qq jq curl dpkg-dev fakeroot git

build_script:
  - mkdir -p output
  - ./build.sh -d -o output --manifest > output/build.log 2>&1; echo "=== EXIT CODE: $? ===" >> output/build.log
  - grep -E 'EXIT CODE|error|failed|Error' output/build.log | tail -5

after_build:
  - ls -la output/

artifacts:
  - path: output/build.log
    name: log

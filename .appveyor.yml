version: '0.1.{build}'

image: Ubuntu2204

environment:
  OUTPUT_DIR: output
  RELEASE_VERSION: 4.8.19.0

install:
  - sudo apt-get update -qq
  - sudo apt-get install -y -qq jq curl dpkg-dev fakeroot

build_script:
  - mkdir -p output
  - echo "=== STEP: git ls-remote ===" && timeout 10 git ls-remote --tags "https://github.com/amnezia-vpn/amnecia-client.git" 2>&1 | tail -3; echo "GIT_EXIT=$?" >> output/diag.log
  - echo "=== STEP: curl test ===" && timeout 10 curl -sIL "https://github.com/amnezia-vpn/amnecia-client/releases/download/4.8.19.0/AmneziaVPN_4.8.19.0_linux_x64.tar" -o /dev/null -w "HTTP %{http_code}\n" 2>&1; echo "CURL_EXIT=$?" >> output/diag.log
  - echo "=== STEP: build.sh ===" && ./build.sh -v "$RELEASE_VERSION" -d -o output --manifest > output/build.log 2>&1; echo "=== EXIT CODE: $? ===" >> output/build.log
  - grep -E 'EXIT CODE|error|failed|Error|succ|Download|SHA256|GIT_EXIT|CURL_EXIT' output/*.log | head -20

after_build:
  - ls -la output/
  - cat output/diag.log 2>/dev/null

artifacts:
  - path: output/*.log
    name: logs

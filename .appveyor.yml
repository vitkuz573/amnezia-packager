version: '0.1.{build}'

image: Ubuntu2204

branches:
  only:
    - main

skip_commits:
  files:
    - '*.md'
    - docs/**
    - .github/**

environment:
  GITHUB_TOKEN:
    secure: o4Nsjt/mOeQpqBPpCnmSDb5GiWBRyLZSdR/bqYw5cBUbVQt/bjME8IkuRk1pWHc0
  OUTPUT_DIR: output
  DEBIAN_FRONTEND: noninteractive

install:
  - sudo apt-get update -qq
  - sudo apt-get install -y -qq jq curl shellcheck bats dpkg-dev fakeroot rpm createrepo-c

build_script:
  - shellcheck -x build.sh src/core/*.sh src/stage/*.sh src/packager/*.sh tools/*.sh || true
  - bats tests/ || true
  - mkdir -p "$OUTPUT_DIR"
  - ./build.sh -d -o "$OUTPUT_DIR" --manifest > "$OUTPUT_DIR/build.log" 2>&1; echo "--- EXIT=$? ---" >> "$OUTPUT_DIR/build.log"; cat "$OUTPUT_DIR/build.log" | tail -40

after_build:
  - ls -la "$OUTPUT_DIR/" 2>&1 || true

artifacts:
  - path: output/build.log
    name: log
  - path: output/*.deb
    name: deb
  - path: output/*.json
    name: manifest

version: '0.1.{build}'

image: Ubuntu2204

branches:
  only:
    - main

skip_commits:
  files:
    - '*.md'
    - docs/**
    - .github/**

environment:
  OUTPUT_DIR: output
  DEBIAN_FRONTEND: noninteractive

install:
  - sudo apt-get update -qq
  - sudo apt-get install -y -qq jq curl shellcheck bats dpkg-dev fakeroot

build_script:
  - mkdir -p output
  - echo "--- step1 sourcing ---" > output/step1.log
  - source src/core/logger.sh >> output/step1.log 2>&1 && echo logger=ok >> output/step1.log
  - source src/core/config.sh >> output/step1.log 2>&1 && echo config=ok >> output/step1.log
  - source src/core/bootstrap.sh >> output/step1.log 2>&1 && echo bootstrap=ok >> output/step1.log
  - source src/core/pipeline.sh >> output/step1.log 2>&1 && echo pipeline=ok >> output/step1.log
  - echo --- sourcing done --- >> output/step1.log
  - echo "--- step2 help ---" > output/step2.log && ./build.sh --help >> output/step2.log 2>&1; echo "HELP_EXIT=$?" >> output/step2.log
  - echo "--- step3 dryrun ---" > output/step3.log && ./build.sh -n -d -o output >> output/step3.log 2>&1; echo "DRYRUN_EXIT=$?" >> output/step3.log
  - echo === step1 === && cat output/step1.log && echo === step2 === && cat output/step2.log && echo === step3 === && cat output/step3.log

after_build:
  - cat output/step1.log
  - cat output/step2.log
  - cat output/step3.log
  - ls -la output/

artifacts:
  - path: output/*.log
    name: logs

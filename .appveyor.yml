version: '0.1.{build}'

image: Ubuntu2204

branches:
  only:
    - main

skip_commits:
  files:
    - '*.md'
    - docs/**
    - .github/**

environment:
  OUTPUT_DIR: /tmp/packages
  REPO_DIR: /tmp/repo
  CORRELATION_ID: ci-{build}
  DEBIAN_FRONTEND: noninteractive

install:
  - echo "=== install dependencies ===" && sudo apt-get update -qq && sudo apt-get install -y -qq jq curl shellcheck bats dpkg-dev fakeroot rpm createrepo-c && echo "=== install done ==="

build_script:
  - echo "=== shellcheck ===" && shellcheck -x build.sh src/core/*.sh src/stage/*.sh src/packager/*.sh tools/*.sh || true
  - echo "=== bats ===" && bats tests/ || true
  - echo "=== build ===" && mkdir -p "$OUTPUT_DIR" "$REPO_DIR" && ./build.sh -d -o "$OUTPUT_DIR" --manifest 2>&1; BUILD_EXIT=$?; echo "BUILD_EXIT=$BUILD_EXIT"
  - echo "=== output ===" && ls -la "$OUTPUT_DIR" || true

after_build:
  - |
    echo "=== after_build ==="
    ls -la "$OUTPUT_DIR" || true
    if [ -f "$OUTPUT_DIR"/*.deb ]; then
      echo "Package found"
    else
      echo "No package produced"
    fi

artifacts:
  - path: /tmp/packages/*.deb
    name: deb
  - path: /tmp/packages/build-manifest.json
    name: manifest

version: '0.1.{build}'

image: Ubuntu2204

branches:
  only:
    - main

skip_commits:
  files:
    - '*.md'
    - docs/**
    - .github/**

environment:
  OUTPUT_DIR: /tmp/packages
  REPO_DIR: /tmp/repo
  CORRELATION_ID: ci-{build}
  DEBIAN_FRONTEND: noninteractive

install:
  - sudo apt-get update -qq
  - sudo apt-get install -y -qq jq curl shellcheck bats dpkg-dev fakeroot rpm createrepo-c

build_script:
  - shellcheck -x build.sh src/core/*.sh src/stage/*.sh src/packager/*.sh tools/*.sh || true
  - bats tests/ || true
  - mkdir -p "$OUTPUT_DIR" "$REPO_DIR"
  - ./build.sh -d -o "$OUTPUT_DIR" --manifest

after_build:
  - ls -la "$OUTPUT_DIR"

artifacts:
  - path: /tmp/packages/*.deb
    name: deb
  - path: /tmp/packages/build-manifest.json
    name: manifest

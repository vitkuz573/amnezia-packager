version: '0.1.{build}'

image: Ubuntu2204

environment:
  OUTPUT_DIR: output
  RELEASE_VERSION: 4.8.19.0

install:
  - sudo apt-get update -qq
  - sudo apt-get install -y -qq jq curl dpkg-dev fakeroot git wget

build_script:
  - mkdir -p output
  - ./build.sh -v "$RELEASE_VERSION" -d -o output --manifest > output/build.log 2>&1; echo "EXIT: $?" >> output/build.log

after_build:
  - ls -la output/
  - cat output/build.log | tail -50

artifacts:
  - path: output/*

version: '0.1.{build}'

image: Ubuntu2204

environment:
  OUTPUT_DIR: output
  RELEASE_VERSION: 4.8.19.0

install:
  - sudo apt-get update -qq
  - sudo apt-get install -y -qq jq curl dpkg-dev fakeroot git

build_script:
  - mkdir -p output
  - echo "=== GIT LS-REMOTE ==="
  - git ls-remote --tags "https://github.com/amnezia-vpn/amnezia-client.git" | tail -5
  - echo "=== BUILD ==="
  - ./build.sh -v "$RELEASE_VERSION" -d -o output --manifest

after_build:
  - ls -la output/

artifacts:
  - path: output/*
